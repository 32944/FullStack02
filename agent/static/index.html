<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        
        .panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
        }
        
        .panel-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f4ff;
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8eeff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-list {
            margin-top: 20px;
        }
        
        .file-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .file-name {
            font-weight: 500;
            color: #333;
        }
        
        .file-status {
            color: #667eea;
            font-size: 14px;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 20px;
            max-width: 80%;
        }
        
        .message.user {
            margin-left: auto;
        }
        
        .message.assistant {
            margin-right: auto;
        }
        
        .message-content {
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message.assistant .message-content {
            background: #f0f4ff;
            color: #333;
        }
        
        .message-sources {
            margin-top: 10px;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
            border: 1px solid #e0e0e0;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        #questionInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        #questionInput:focus {
            border-color: #667eea;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 RAG智能助手</h1>
            <p>上传PDF，与文档对话</p>
        </div>
        
        <div class="main-content">
            <div class="panel">
                <div class="panel-title">
                    <span>📁</span>
                    <span>上传知识库</span>
                </div>
                
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">点击或拖拽PDF文件到此处</div>
                </div>
                <input type="file" id="fileInput" accept=".pdf">
                
                <div class="file-list" id="fileList"></div>
            </div>
            
            <div class="panel">
                <div class="panel-title">
                    <span>💬</span>
                    <span>智能对话</span>
                </div>
                
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message assistant">
                            <div class="message-content">
                                您好！我是RAG智能助手。请先上传PDF文件，然后就可以向我提问了！
                            </div>
                        </div>
                    </div>
                    
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div>正在思考中...</div>
                    </div>
                    
                    <div class="input-area">
                        <input type="text" id="questionInput" placeholder="请输入您的问题...">
                        <button class="btn btn-primary" id="sendBtn">发送</button>
                    </div>
                    
                    <div class="controls">
                        <button class="btn btn-secondary" id="clearBtn">清空对话</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const chatMessages = document.getElementById('chatMessages');
        const questionInput = document.getElementById('questionInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        async function handleFile(file) {
            if (!file.name.endsWith('.pdf')) {
                alert('只支持PDF文件');
                return;
            }
            
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            fileItem.innerHTML = `
                <span class="file-name">${file.name}</span>
                <span class="file-status">上传中...</span>
            `;
            fileList.appendChild(fileItem);
            
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    fileItem.querySelector('.file-status').textContent = '✓ 处理成功';
                    fileItem.querySelector('.file-status').style.color = '#28a745';
                } else {
                    fileItem.querySelector('.file-status').textContent = '✗ 处理失败';
                    fileItem.querySelector('.file-status').style.color = '#dc3545';
                }
            } catch (error) {
                fileItem.querySelector('.file-status').textContent = '✗ 上传失败';
                fileItem.querySelector('.file-status').style.color = '#dc3545';
            }
        }
        
        function addMessage(content, role, sources = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            let html = `<div class="message-content">${content}</div>`;
            
            if (sources && sources.length > 0) {
                html += `
                    <div class="message-sources">
                        <strong>参考段落：</strong>
                        ${sources.map((s, i) => `<div style="margin-top:5px;">[${i + 1}] ${s.substring(0, 100)}...</div>`).join('')}
                    </div>
                `;
            }
            
            messageDiv.innerHTML = html;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;
            
            addMessage(question, 'user');
            questionInput.value = '';
            loading.classList.add('show');
            
            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    addMessage(result.data.answer, 'assistant', result.data.sources);
                } else {
                    addMessage('抱歉，出现了错误，请稍后再试。', 'assistant');
                }
            } catch (error) {
                addMessage('抱歉，网络错误，请稍后再试。', 'assistant');
            } finally {
                loading.classList.remove('show');
            }
        }
        
        sendBtn.addEventListener('click', sendQuestion);
        
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendQuestion();
            }
        });
        
        clearBtn.addEventListener('click', async () => {
            await fetch('/api/history/clear', { method: 'POST' });
            chatMessages.innerHTML = `
                <div class="message assistant">
                    <div class="message-content">
                        您好！我是RAG智能助手。请先上传PDF文件，然后就可以向我提问了！
                    </div>
                </div>
            `;
        });
        
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const result = await response.json();
                if (result.success && result.data.length > 0) {
                    chatMessages.innerHTML = '';
                    result.data.forEach(msg => {
                        addMessage(msg.content, msg.role);
                    });
                }
            } catch (error) {
                console.error('加载历史失败', error);
            }
        }
        
        loadHistory();
    </script>
</body>
</html>
